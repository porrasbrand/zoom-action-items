<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Zoom Meeting Notes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      text-align: center;
      padding: 40px;
      background: #161b22;
      border-radius: 12px;
      border: 1px solid #30363d;
      max-width: 400px;
      width: 90%;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 24px;
      color: #f0f6fc;
      margin-bottom: 12px;
    }

    p {
      color: #8b949e;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .google-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      color: #333;
      padding: 12px 24px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.2s;
      border: 1px solid #ddd;
    }

    .google-btn:hover {
      background: #f5f5f5;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .google-btn img {
      width: 24px;
      height: 24px;
    }

    .error-container {
      background: #21262d;
      border: 1px solid #f85149;
    }

    .error-container h1 {
      color: #f85149;
    }

    .error-email {
      background: #0d1117;
      padding: 8px 16px;
      border-radius: 4px;
      font-family: monospace;
      color: #58a6ff;
      margin-bottom: 16px;
      display: inline-block;
    }

    .try-again {
      color: #58a6ff;
      text-decoration: none;
    }

    .try-again:hover {
      text-decoration: underline;
    }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #6e7681;
    }
  </style>
</head>
<body>
  <div class="login-container" id="loginBox">
    <div class="logo">📹</div>
    <h1>Zoom Meeting Notes</h1>
    <p>Sign in to access meeting transcripts, action items, and team coordination.</p>
    <a href="/zoom/auth/google" class="google-btn">
      <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google" />
      Sign in with Google
    </a>
    <div class="footer">
      Only authorized team members can access this dashboard.
    </div>
  </div>

  <script>
    // Check for error query param
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    const email = params.get('email');

    if (error === 'access_denied' && email) {
      document.getElementById('loginBox').innerHTML = `
        <div class="logo">🚫</div>
        <h1>Access Denied</h1>
        <p>Your email is not authorized to access this dashboard.</p>
        <div class="error-email">${email}</div>
        <p>Contact an administrator to request access.</p>
        <a href="/zoom/login" class="try-again">Try a different account</a>
      `;
      document.getElementById('loginBox').classList.add('error-container');
    } else if (error) {
      document.getElementById('loginBox').innerHTML = `
        <div class="logo">⚠️</div>
        <h1>Login Error</h1>
        <p>Something went wrong during sign in. Please try again.</p>
        <a href="/zoom/auth/google" class="google-btn">
          <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google" />
          Try Again
        </a>
      `;
    }
  </script>
</body>
</html>
